name: Deploy to Production

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  NODE_VERSION: "22.14.0"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: |
          echo "🔨 Building with Node.js $(node -v)"
          export NODE_OPTIONS="--max-old-space-size=2048"
          npm run build
          echo "✅ Build completed successfully"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "🚀 Starting deployment at $(date)"
            echo "================================="

            # Переходим в проект
            cd /root/projects/client
            echo "📂 Working in: $(pwd)"

            # Получаем обновления кода (без node_modules)
            echo "📥 Fetching latest code..."
            git fetch origin
            git reset --hard origin/master

            # Очищаем старую сборку
            echo "🧹 Cleaning old build..."
            rm -rf .next
            rm -rf node_modules/.cache

      - name: Copy built files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: ".next,package.json,package-lock.json,public"
          target: "/root/projects/client"
          strip_components: 0

      - name: Restart application
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/projects/client

            # Устанавливаем только production зависимости
            npm ci --only=production

            # Исправляем права доступа
            sudo chown -R www-data:www-data .next
            sudo chmod -R 755 .next

            # Перезапускаем приложение
            pm2 restart rvz-client || pm2 start npm --name "rvz-client" -- start

            # Перезагружаем nginx
            sudo nginx -t && sudo systemctl reload nginx

            echo "✅ Deployment completed!"
